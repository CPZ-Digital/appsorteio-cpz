<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volley Team Sorter Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='80'>🏐</text></svg>" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2146">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
    color-scheme:light;
    --bg:#eef1f6;
    --surface:#ffffff;
    --surface-soft:#f5f7fa;
    --surface-strong:#e4e9f2;
    --line:#d0d7e3;
    --text:#0f172a;
    --muted:#64748b;
    --accent:#2563eb;
    --accent-strong:#1d4ed8;
    --accent-soft:#dbeafe;
    --positive:#16a34a;
    --positive-soft:#dcfce7;
    --warning:#d97706;
    --warning-soft:#fef3c7;
    --danger:#dc2626;
    --danger-soft:#fee2e2;
    --shadow:0 20px 60px rgba(15,23,42,0.13);
    --header-from:#0d2146;
    --header-to:#1a3a6e;
    --font:'Inter', system-ui, -apple-system, sans-serif;
    --team1:#2563eb; --team1-soft:#dbeafe;
    --team2:#ea580c; --team2-soft:#ffedd5;
    --team3:#16a34a; --team3-soft:#dcfce7;
    --team4:#7c3aed; --team4-soft:#ede9fe;
}

html[data-theme='dark']{
    color-scheme:dark;
    --bg:#0a0f1e;
    --surface:#131929;
    --surface-soft:#0f1522;
    --surface-strong:#1c2438;
    --line:#232d42;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --accent:#3b82f6;
    --accent-strong:#60a5fa;
    --accent-soft:#1e3a5f;
    --positive:#22c55e;
    --positive-soft:#14532d;
    --warning:#f59e0b;
    --warning-soft:#451a03;
    --danger:#f87171;
    --danger-soft:#450a0a;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
    --header-from:#060d1f;
    --header-to:#0d2146;
    --team1:#3b82f6; --team1-soft:#1e3a5f;
    --team2:#f97316; --team2-soft:#431407;
    --team3:#22c55e; --team3-soft:#14532d;
    --team4:#a78bfa; --team4-soft:#2e1065;
}

*{ box-sizing:border-box; }

body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
}

button, input, select, textarea{ font:inherit; }
button{ border:none; cursor:pointer; }
h1, h2, h3, p{ margin:0; }

.app{
    width:min(100%, 860px);
    margin:0 auto;
    padding-bottom:24px;
}

/* ── HEADER ── */
.topbar{
    background:linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%);
    padding:18px 20px 16px;
    display:flex;
    flex-direction:column;
    gap:14px;
    position:relative;
    overflow:hidden;
}

.topbar::before{
    content:'🏐';
    position:absolute;
    right:-10px;
    top:-14px;
    font-size:100px;
    opacity:0.07;
    pointer-events:none;
    user-select:none;
}

.brand{
    display:flex;
    flex-direction:column;
    gap:2px;
}

.brand h1{
    font-size:20px;
    font-weight:900;
    color:#fff;
    letter-spacing:-0.3px;
}

.brand-sub{
    font-size:12px;
    color:rgba(255,255,255,0.55);
    font-weight:500;
}

.stats-row{
    display:flex;
    gap:8px;
}

.stat-pill{
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 12px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:100px;
    backdrop-filter:blur(4px);
}

.stat-pill span{
    font-size:11px;
    color:rgba(255,255,255,0.6);
    font-weight:600;
}

.stat-pill strong{
    font-size:15px;
    font-weight:800;
    color:#fff;
    line-height:1;
}

/* ── LAYOUT ── */
.main-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    padding:14px 14px 0;
}

.panel{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:0 4px 24px rgba(15,23,42,0.06);
    border-radius:16px;
    overflow:hidden;
}

.panel-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:13px 14px;
    border-bottom:1px solid var(--line);
    background:var(--surface-soft);
}

.panel-icon{
    width:30px;
    height:30px;
    border-radius:8px;
    background:var(--accent-soft);
    color:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    flex-shrink:0;
}

.panel-head-text{ flex:1; min-width:0; }

.panel-head h2{
    font-size:14px;
    font-weight:800;
    letter-spacing:-0.1px;
}

.hint{
    color:var(--muted);
    font-size:11px;
    margin-top:2px;
    line-height:1.4;
}

/* ── BUTTONS ── */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:38px;
    padding:9px 16px;
    border-radius:10px;
    color:#fff;
    background:var(--accent);
    font-weight:700;
    font-size:14px;
    letter-spacing:-0.1px;
    transition:filter 120ms, transform 80ms;
}

.btn:active{ transform:scale(0.97); }
.btn:hover{ filter:brightness(1.08); }
.btn.secondary{ color:var(--text); background:var(--surface-strong); }
.btn.warning{ color:#fff; background:#d97706; }
.btn.success{ color:#fff; background:var(--positive); }
.btn.danger{ color:#fff; background:var(--danger); }
.btn:disabled{ cursor:not-allowed; filter:grayscale(0.6); opacity:0.5; }

.btn-draw{
    background:linear-gradient(135deg, #d97706, #f59e0b);
    color:#fff;
    font-weight:800;
    font-size:15px;
    min-height:48px;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(217,119,6,0.35);
}

.btn-draw:hover{ filter:brightness(1.06); }

.btn-redraw{
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
    box-shadow:0 4px 16px rgba(37,99,235,0.3);
}

/* ── PLAYER GRID ── */
.player-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:8px;
    padding:12px;
}

.player-card{
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:74px;
    padding:10px 10px 8px;
    border-radius:12px;
    background:var(--surface-soft);
    border:1.5px solid var(--line);
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:border-color 120ms, background 120ms, box-shadow 120ms;
}

.player-card:active{ transform:scale(0.96); }

.player-card.selected{
    background:var(--accent-soft);
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent);
}

.player-card.add-card{
    display:grid;
    place-items:center;
    min-height:74px;
    font-size:22px;
    font-weight:700;
    color:var(--muted);
    background:transparent;
    border:2px dashed var(--line);
}

.player-card.add-card:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-soft);
}

.player-name{
    display:block;
    font-size:13px;
    font-weight:800;
    line-height:1.2;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:var(--text);
    padding-right:16px;
}

.player-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:6px;
}

.player-role{
    font-size:10px;
    color:var(--muted);
    font-weight:600;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.skill-dots{
    display:flex;
    gap:2px;
    flex-shrink:0;
}

.skill-dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--line);
}

.skill-dot.on-low{ background:#ef4444; }
.skill-dot.on-mid{ background:#f59e0b; }
.skill-dot.on-high{ background:#16a34a; }

.player-edit{
    all:unset;
    position:absolute;
    top:5px;
    right:5px;
    font-size:14px;
    color:var(--muted);
    cursor:pointer;
    line-height:1;
    padding:3px;
    border-radius:4px;
}

.player-edit:hover{ color:var(--accent); background:var(--accent-soft); }

/* ── ACTIONS BAR ── */
.actions-bar{
    display:flex;
    gap:8px;
    padding:10px 12px 14px;
}

.actions-bar .btn{ flex:1; }

/* ── EMPTY STATE ── */
.empty{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:220px;
    padding:24px;
    color:var(--muted);
    text-align:center;
    line-height:1.5;
    font-size:13px;
}

.empty-icon{
    font-size:40px;
    opacity:0.4;
}

/* ── TEAMS ── */
.teams-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:12px;
}

.team{
    border-radius:12px;
    background:var(--surface-soft);
    border:1px solid var(--line);
    overflow:hidden;
}

.team-header{
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    border-bottom:1px solid var(--line);
}

.team-color-bar{
    width:4px;
    height:100%;
    border-radius:2px;
    flex-shrink:0;
    align-self:stretch;
}

.team-title{
    flex:1;
    font-size:14px;
    font-weight:800;
    letter-spacing:-0.1px;
}

.team-stats{
    display:flex;
    gap:6px;
    flex-shrink:0;
}

.stat-badge{
    padding:3px 8px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
}

.team-positions{
    padding:6px 12px;
    font-size:11px;
    color:var(--muted);
    border-bottom:1px solid var(--line);
    font-weight:500;
}

.team-body{
    display:grid;
    gap:5px;
    padding:8px;
}

.team-player{
    display:grid;
    grid-template-columns:28px 1fr auto;
    gap:8px;
    align-items:center;
    min-height:36px;
    padding:6px 8px;
    border-radius:8px;
    background:var(--surface);
    border:1px solid var(--line);
}

.player-order{
    display:flex;
    align-items:center;
    justify-content:center;
    width:22px;
    height:22px;
    border-radius:6px;
    font-size:11px;
    font-weight:900;
}

.team-player strong{
    font-size:13px;
    font-weight:700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.player-role-badge{
    display:inline-flex;
    align-items:center;
    padding:2px 7px;
    border-radius:20px;
    font-size:10px;
    font-weight:700;
    white-space:nowrap;
}

/* ── MODAL ── */
.modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    background:rgba(0,0,0,0.6);
    z-index:20;
    backdrop-filter:blur(2px);
}

.modal.show{ display:flex; }

.dialog{
    width:min(400px, 100%);
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow);
    max-height:92vh;
    overflow-y:auto;
}

.dialog-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:14px 14px 12px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:var(--surface);
    z-index:1;
}

.dialog-head h2{
    font-size:15px;
    font-weight:800;
    letter-spacing:-0.2px;
}

.close-btn{
    all:unset;
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    background:var(--surface-strong);
    cursor:pointer;
    color:var(--muted);
    font-size:13px;
}

.close-btn:hover{ color:var(--text); }

.dialog-body{ padding:14px; }

.form-group{
    display:grid;
    gap:6px;
    margin-bottom:12px;
}

label{
    display:block;
    color:var(--muted);
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
}

input[type="text"],
input[type="number"],
select,
textarea{
    width:100%;
    min-height:38px;
    padding:9px 11px;
    color:var(--text);
    background:var(--surface-soft);
    border:1.5px solid var(--line);
    border-radius:9px;
    outline:none;
    font-weight:500;
}

input:focus,
select:focus,
textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

textarea{
    min-height:60px;
    resize:vertical;
    font-family:var(--font);
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.form-group-full{ grid-column:1 / -1; }

.checkbox-group{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.checkbox-option{
    all:unset;
    display:flex;
    align-items:center;
    gap:7px;
    padding:9px 11px;
    border-radius:9px;
    background:var(--surface-soft);
    border:1.5px solid var(--line);
    cursor:pointer;
    font-weight:600;
    font-size:13px;
    transition:all 100ms;
}

.checkbox-option input{
    all:unset;
    width:16px;
    height:16px;
    border:2px solid var(--line);
    border-radius:4px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.checkbox-option input:checked{ background:var(--accent); border-color:var(--accent); }
.checkbox-option:has(input:checked){ background:var(--accent-soft); border-color:var(--accent); }

.dialog-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--line);
}

.star-rating{
    display:flex;
    gap:5px;
    margin-top:4px;
}

.star-btn{
    all:unset;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:9px;
    background:var(--surface-soft);
    border:1.5px solid var(--line);
    cursor:pointer;
    font-size:17px;
    transition:all 100ms;
}

.star-btn:hover{ transform:scale(1.08); }
.star-btn.active{ background:var(--warning-soft); border-color:var(--warning); }

/* ── RESPONSIVE ── */
@media (max-width:600px){
    .player-grid{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
    .teams-grid{ grid-template-columns:1fr; }
}

@media (min-width:480px){
    .player-grid{ grid-template-columns:repeat(4, minmax(0, 1fr)); }
}

@media (min-width:640px){
    .teams-grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
}

/* ── FOOTER ── */
.footer-signature{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 16px 8px;
}

.footer-signature img{
    width:130px;
    height:auto;
    background:white;
    border-radius:8px;
    padding:4px 10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
</style>
</head>
<body>
<main class="app">
    <header class="topbar">
        <div class="brand">
            <h1>🏐 Volley Team Sorter</h1>
            <span class="brand-sub">Sorteio inteligente e equilibrado de times</span>
        </div>
        <div class="stats-row">
            <div class="stat-pill">
                <span>Selecionados</span>
                <strong id="statPlayers">0</strong>
            </div>
            <div class="stat-pill">
                <span>Times</span>
                <strong id="statTeams">0</strong>
            </div>
        </div>
    </header>

    <section class="main-grid">
        <section class="panel">
            <div class="panel-head">
                <div class="panel-icon">👥</div>
                <div class="panel-head-text">
                    <h2>Jogadores</h2>
                    <p class="hint">Toque para selecionar · ··· para editar</p>
                </div>
            </div>
            <div class="player-grid" id="playerGrid"></div>
            <div class="actions-bar">
                <button class="btn btn-draw" type="button" id="configBtn">⚙ Sortear</button>
                <button class="btn btn-redraw" type="button" id="redrawBtn" style="display:none;">↺ Refazer</button>
                <button class="btn secondary" type="button" id="clearBtn">Limpar</button>
            </div>
        </section>

        <section class="panel" id="resultPanel" style="display:none;">
            <div class="panel-head">
                <div class="panel-icon">🏆</div>
                <div class="panel-head-text">
                    <h2>Times sorteados</h2>
                    <p class="hint" id="confidenceHint"></p>
                </div>
            </div>
            <div id="result">
                <div class="empty">
                    <div class="empty-icon">🏐</div>
                    Clique em "Sortear" para gerar times equilibrados.
                </div>
            </div>
        </section>
    </section>

    <footer class="footer-signature">
        <img src="cpz-assinatura.png" alt="CPZ">
    </footer>
</main>

<div class="modal" id="playerModal">
    <div class="dialog">
        <div class="dialog-head">
            <h2 id="modalTitle">Novo jogador</h2>
            <button class="close-btn" id="closeModal">✕</button>
        </div>
        <form id="playerForm" class="dialog-body">
            <div class="form-group form-group-full">
                <label for="playerName">Nome *</label>
                <input id="playerName" type="text" maxlength="50" required placeholder="Ex: João Silva">
            </div>

            <div class="form-group form-group-full">
                <label>Nota Técnica (0-5) *</label>
                <div class="star-rating" id="skillRating"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="positionMain">Posição Principal *</label>
                    <select id="positionMain" required>
                        <option value="">Selecione</option>
                        <option value="levantador">Levantador</option>
                        <option value="oposto">Oposto</option>
                        <option value="ponteiro">Ponteiro</option>
                        <option value="central">Central</option>
                        <option value="libero">Líbero</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="positionSecond">Posição Secundária</label>
                    <select id="positionSecond">
                        <option value="">Nenhuma</option>
                        <option value="levantador">Levantador</option>
                        <option value="oposto">Oposto</option>
                        <option value="ponteiro">Ponteiro</option>
                        <option value="central">Central</option>
                        <option value="libero">Líbero</option>
                    </select>
                </div>
            </div>

            <div class="form-group form-group-full">
                <label for="experience">Experiência *</label>
                <select id="experience" required>
                    <option value="">Selecione</option>
                    <option value="iniciante">Iniciante</option>
                    <option value="recreativo">Recreativo</option>
                    <option value="intermediario">Intermediário</option>
                    <option value="avancado">Avançado</option>
                    <option value="competitivo">Competitivo</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="height">Altura (cm)</label>
                    <input id="height" type="number" min="100" max="220" placeholder="Ex: 180">
                </div>

                <div class="form-group">
                    <label for="availability">Disponibilidade</label>
                    <select id="availability">
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>
            </div>

            <div class="form-group form-group-full">
                <label for="notes">Observações</label>
                <textarea id="notes" placeholder="Notas adicionais..."></textarea>
            </div>

            <div class="dialog-actions">
                <button class="btn" type="submit">Salvar</button>
                <button class="btn secondary" type="button" id="deleteBtn" style="display:none;">Excluir</button>
                <button class="btn danger" type="button" id="cancelBtn">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="configModal">
    <div class="dialog" style="width:min(340px,100%);">
        <div class="dialog-head">
            <h2>Configurar sorteio</h2>
            <button class="close-btn" id="closeConfigBtn">✕</button>
        </div>
        <form id="configForm" class="dialog-body">
            <div class="form-group form-group-full">
                <label for="formationType">Formação</label>
                <select id="formationType">
                    <option value="5x1">5x1 (7 jogadores)</option>
                    <option value="6x2">6x2 (8 jogadores)</option>
                    <option value="4x2">4x2 (6 jogadores)</option>
                    <option value="livre">Livre (sem posições obrigatórias)</option>
                    <option value="areia">Areia 2x2 (2 jogadores)</option>
                    <option value="quarteto">Quarteto 4x4 (4 jogadores)</option>
                </select>
            </div>

            <div class="form-group form-group-full">
                <label for="mode">Modo</label>
                <select id="mode">
                    <option value="pelada">Pelada (rápido e equilibrado)</option>
                    <option value="treino">Treino (misturar forças)</option>
                    <option value="campeonato">Campeonato (máxima competitividade)</option>
                    <option value="misto">Misto (com % feminino)</option>
                </select>
            </div>

            <div class="form-row" id="mixedModeOptions" style="display:none;">
                <div class="form-group">
                    <label for="womenPercentage">% Feminino por time</label>
                    <select id="womenPercentage">
                        <option value="0">0%</option>
                        <option value="25">25%</option>
                        <option value="33">33%</option>
                        <option value="50">50%</option>
                    </select>
                </div>
            </div>

            <div class="dialog-actions">
                <button class="btn" type="submit" style="grid-column:1/-1;">Sortear!</button>
                <button class="btn secondary" type="button" id="cancelConfigBtn" style="display:none;">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
const STORAGE_KEY = "volley-sorter-players-v1";
const SELECTED_KEY = "volley-sorter-selected-v1";
const CONFIG_KEY = "volley-sorter-config-v1";

const POSITIONS = {
    levantador: "Levantador",
    oposto: "Oposto",
    ponteiro: "Ponteiro",
    central: "Central",
    libero: "Líbero"
};

const FORMATIONS = {
    "5x1": { size: 7, required: { levantador: 1, oposto: 1, ponteiro: 2, central: 2, libero: 1 } },
    "6x2": { size: 8, required: { levantador: 2, oposto: 1, ponteiro: 2, central: 2, libero: 1 } },
    "4x2": { size: 6, required: { levantador: 2, oposto: 1, ponteiro: 2, central: 1, libero: 0 } },
    "livre": { size: -1, required: {} },
    "areia": { size: 2, required: {} },
    "quarteto": { size: 4, required: {} }
};

let players = [];
let selectedIds = [];
let editingId = null;
let lastDraw = null;

function init(){
    loadData();
    renderPlayers();
    setupEventListeners();
    initTheme();
    if (localStorage.getItem(CONFIG_KEY)) {
        document.getElementById("redrawBtn").style.display = "";
    }
}

function loadData(){
    try {
        players = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        selectedIds = JSON.parse(localStorage.getItem(SELECTED_KEY)) || [];
    } catch (e) {
        players = [];
        selectedIds = [];
    }

    if (players.length === 0) {
        players = createDefaultPlayers();
        saveData();
    }
}

function createDefaultPlayers(){
    return [
        { id: uid(), name: "Ana Silva", skill: 3, positionMain: "ponteiro", positionSecond: "central", experience: "intermediario", height: 175, availability: "ativo", notes: "" },
        { id: uid(), name: "Bruno Santos", skill: 4, positionMain: "levantador", positionSecond: "", experience: "avancado", height: 180, availability: "ativo", notes: "" },
        { id: uid(), name: "Carlos Mendes", skill: 5, positionMain: "central", positionSecond: "oposto", experience: "competitivo", height: 195, availability: "ativo", notes: "" },
        { id: uid(), name: "Diana Costa", skill: 2, positionMain: "libero", positionSecond: "", experience: "recreativo", height: 165, availability: "ativo", notes: "" },
        { id: uid(), name: "Enzo Martins", skill: 4, positionMain: "oposto", positionSecond: "ponteiro", experience: "avancado", height: 185, availability: "ativo", notes: "" },
        { id: uid(), name: "Fernanda Lima", skill: 3, positionMain: "ponteiro", positionSecond: "levantador", experience: "intermediario", height: 172, availability: "ativo", notes: "" },
        { id: uid(), name: "Gustavo Rocha", skill: 2, positionMain: "ponteiro", positionSecond: "central", experience: "recreativo", height: 182, availability: "ativo", notes: "" },
        { id: uid(), name: "Helena Reis", skill: 4, positionMain: "levantador", positionSecond: "", experience: "avancado", height: 168, availability: "ativo", notes: "" },
        { id: uid(), name: "Igor Cardoso", skill: 5, positionMain: "oposto", positionSecond: "ponteiro", experience: "competitivo", height: 188, availability: "ativo", notes: "" },
        { id: uid(), name: "Julia Souza", skill: 3, positionMain: "central", positionSecond: "libero", experience: "intermediario", height: 180, availability: "ativo", notes: "" },
    ];
}

function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
    localStorage.setItem(SELECTED_KEY, JSON.stringify(selectedIds));
}

function renderPlayers(){
    const grid = document.getElementById("playerGrid");
    const sorted = players.slice().sort((a, b) => a.name.localeCompare(b.name));

    grid.innerHTML = sorted.map(player => {
        const selected = selectedIds.includes(player.id);
        const role = POSITIONS[player.positionMain] || player.positionMain;
        const skill = player.skill || 0;
        const dotClass = skill <= 2 ? "on-low" : skill === 3 ? "on-mid" : "on-high";
        const dots = Array.from({length:5}, (_, i) => `<span class="skill-dot ${i < skill ? dotClass : ""}"></span>`).join("");
        return `
            <div class="player-card ${selected ? "selected" : ""}" onclick="togglePlayer('${player.id}')">
                <span class="player-name">${escapeHtml(player.name)}</span>
                <div class="player-meta">
                    <span class="player-role">${role}</span>
                    <div class="skill-dots">${dots}</div>
                </div>
                <button class="player-edit" type="button" onclick="event.stopPropagation();editPlayer('${player.id}')" title="Editar">···</button>
            </div>
        `;
    }).join("") + `
        <button class="player-card add-card" type="button" onclick="createPlayer()">+</button>
    `;

    updateStats();
}

function updateStats(){
    document.getElementById("statPlayers").textContent = selectedIds.length;
    document.getElementById("statTeams").textContent = lastDraw ? lastDraw.teams.length : 0;
}

function togglePlayer(id){
    if (selectedIds.includes(id)) {
        selectedIds = selectedIds.filter(s => s !== id);
    } else {
        selectedIds.push(id);
    }
    saveData();
    renderPlayers();
}

function createPlayer(){
    editingId = null;
    document.getElementById("modalTitle").textContent = "Novo jogador";
    document.getElementById("deleteBtn").style.display = "none";
    document.getElementById("playerForm").reset();
    updateSkillRating(3);
    document.getElementById("playerModal").classList.add("show");
    document.getElementById("playerName").focus();
}

function editPlayer(id){
    editingId = id;
    const player = players.find(p => p.id === id);
    if (!player) return;

    document.getElementById("modalTitle").textContent = "Editar jogador";
    document.getElementById("deleteBtn").style.display = "flex";

    document.getElementById("playerName").value = player.name;
    document.getElementById("positionMain").value = player.positionMain;
    document.getElementById("positionSecond").value = player.positionSecond || "";
    document.getElementById("experience").value = player.experience;
    document.getElementById("height").value = player.height || "";
    document.getElementById("availability").value = player.availability || "ativo";
    document.getElementById("notes").value = player.notes || "";
    updateSkillRating(player.skill);

    document.getElementById("playerModal").classList.add("show");
}

function closeModal(){
    document.getElementById("playerModal").classList.remove("show");
    editingId = null;
}

function setupEventListeners(){
    document.getElementById("playerForm").addEventListener("submit", savePlayer);
    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("deleteBtn").addEventListener("click", deletePlayer);
    document.getElementById("configBtn").addEventListener("click", () => {
        if (selectedIds.length === 0) {
            alert("Selecione pelo menos um jogador!");
            return;
        }
        document.getElementById("configModal").classList.add("show");
    });
    document.getElementById("closeConfigBtn").addEventListener("click", closeConfigModal);
    document.getElementById("configForm").addEventListener("submit", handleDrawSubmit);
    document.getElementById("mode").addEventListener("change", e => {
        document.getElementById("mixedModeOptions").style.display = e.target.value === "misto" ? "grid" : "none";
    });
    document.getElementById("redrawBtn").addEventListener("click", () => {
        if (selectedIds.length === 0) {
            alert("Selecione pelo menos um jogador!");
            return;
        }
        const saved = JSON.parse(localStorage.getItem(CONFIG_KEY));
        if (!saved) return;
        drawTeams(saved.formation, saved.mode, saved.womenPercentage);
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
        selectedIds = [];
        saveData();
        renderPlayers();
    });
    document.getElementById("playerModal").addEventListener("click", e => {
        if (e.target === document.getElementById("playerModal")) closeModal();
    });
    document.getElementById("configModal").addEventListener("click", e => {
        if (e.target === document.getElementById("configModal")) closeConfigModal();
    });
    renderSkillRating();
}

function closeConfigModal(){
    document.getElementById("configModal").classList.remove("show");
}

function handleDrawSubmit(e){
    e.preventDefault();
    const formation = document.getElementById("formationType").value;
    const mode = document.getElementById("mode").value;
    const womenPercentage = mode === "misto" ? parseInt(document.getElementById("womenPercentage").value) : 0;

    localStorage.setItem(CONFIG_KEY, JSON.stringify({ formation, mode, womenPercentage }));
    document.getElementById("redrawBtn").style.display = "";
    drawTeams(formation, mode, womenPercentage);
    closeConfigModal();
}

function renderSkillRating(){
    const container = document.getElementById("skillRating");
    let html = "";
    for (let i = 1; i <= 5; i++) {
        html += `<button type="button" class="star-btn" data-value="${i}">★</button>`;
    }
    container.innerHTML = html;
    container.querySelectorAll(".star-btn").forEach(btn => {
        btn.addEventListener("click", () => updateSkillRating(parseInt(btn.dataset.value)));
    });
}

function updateSkillRating(value){
    document.querySelectorAll("#skillRating .star-btn").forEach(btn => {
        if (parseInt(btn.dataset.value) <= value) {
            btn.classList.add("active");
        } else {
            btn.classList.remove("active");
        }
    });
    document.getElementById("playerForm").dataset.skill = value;
}

function savePlayer(e){
    e.preventDefault();

    const name = document.getElementById("playerName").value.trim();
    const skill = parseInt(document.getElementById("playerForm").dataset.skill) || 3;
    const positionMain = document.getElementById("positionMain").value;
    const positionSecond = document.getElementById("positionSecond").value;
    const experience = document.getElementById("experience").value;
    const height = document.getElementById("height").value ? parseInt(document.getElementById("height").value) : 0;
    const availability = document.getElementById("availability").value;
    const notes = document.getElementById("notes").value.trim();

    if (!name || !positionMain || !experience) {
        alert("Preencha todos os campos obrigatórios!");
        return;
    }

    if (editingId) {
        const player = players.find(p => p.id === editingId);
        if (player) {
            player.name = name;
            player.skill = skill;
            player.positionMain = positionMain;
            player.positionSecond = positionSecond;
            player.experience = experience;
            player.height = height;
            player.availability = availability;
            player.notes = notes;
        }
    } else {
        players.push({
            id: uid(),
            name,
            skill,
            positionMain,
            positionSecond,
            experience,
            height,
            availability,
            notes
        });
        selectedIds.push(players[players.length - 1].id);
    }

    saveData();
    renderPlayers();
    closeModal();
}

function deletePlayer(){
    if (!editingId) return;
    players = players.filter(p => p.id !== editingId);
    selectedIds = selectedIds.filter(id => id !== editingId);
    saveData();
    renderPlayers();
    closeModal();
}

function drawTeams(formation, mode, womenPercentage){
    if (selectedIds.length === 0) {
        alert("Selecione pelo menos um jogador!");
        return;
    }

    const pool = players.filter(p => selectedIds.includes(p.id));
    const config = FORMATIONS[formation];

    let attempts = 500;
    let bestTeams = null;
    let bestScore = Infinity;
    let bestConfidence = 0;

    for (let i = 0; i < attempts; i++) {
        const { teams, score, confidence } = buildTeamsAttempt(pool, formation, mode, womenPercentage);
        if (score < bestScore) {
            bestScore = score;
            bestTeams = teams;
            bestConfidence = confidence;
        }
    }

    lastDraw = { teams: bestTeams, score: bestScore, confidence: bestConfidence };
    renderTeams(bestTeams, bestConfidence, formation, mode);
    document.getElementById("resultPanel").style.display = "block";
    updateStats();
}

function buildTeamsAttempt(pool, formation, mode, womenPercentage){
    let teams = [];
    const config = FORMATIONS[formation];

    if (formation === "areia") {
        teams = [
            { name: "Time 1", players: [] },
            { name: "Time 2", players: [] }
        ];
    } else if (formation === "quarteto") {
        teams = [
            { name: "Time 1", players: [] },
            { name: "Time 2", players: [] }
        ];
    } else {
        const teamCount = formation === "livre" ? getTeamCount(pool.length) : 2;
        teams = Array.from({ length: teamCount }, (_, i) => ({
            name: `Time ${i + 1}`,
            players: []
        }));
    }

    // Shuffle pool
    const shuffled = shuffle(pool);

    // Sort by skill descending
    shuffled.sort((a, b) => b.skill - a.skill);

    // Distribute
    const teamsPerPlayer = teams.length;
    shuffled.forEach((player, idx) => {
        const teamIdx = idx % teamsPerPlayer;
        teams[teamIdx].players.push(player);
    });

    // Calculate metrics
    const score = calculateScore(teams, formation, mode);
    const confidence = calculateConfidence(teams, formation, mode);

    return { teams, score, confidence };
}

function calculateScore(teams, formation, mode){
    let score = 0;

    // Skill balance
    const skills = teams.map(t => t.players.reduce((s, p) => s + p.skill, 0));
    const avgSkill = skills.reduce((a, b) => a + b, 0) / skills.length;
    const skillVariance = skills.reduce((sum, s) => sum + Math.abs(s - avgSkill), 0);
    score += skillVariance * 10;

    // Size balance
    const sizes = teams.map(t => t.players.length);
    const maxSize = Math.max(...sizes);
    const minSize = Math.min(...sizes);
    score += (maxSize - minSize) * 20;

    // Experience balance (for training mode)
    if (mode === "treino") {
        const experiences = teams.map(t => {
            const avgExp = t.players.reduce((sum, p) => p.skill, 0) / Math.max(1, t.players.length);
            return avgExp;
        });
        const avgExp = experiences.reduce((a, b) => a + b, 0) / experiences.length;
        const expVariance = experiences.reduce((sum, e) => sum + Math.abs(e - avgExp), 0);
        score += expVariance * 8;
    }

    // Position balance (for fixed formations)
    if (formation !== "livre" && formation !== "areia" && formation !== "quarteto") {
        const required = FORMATIONS[formation].required;
        teams.forEach(team => {
            Object.keys(required).forEach(pos => {
                const count = team.players.filter(p => p.positionMain === pos).length;
                const needed = required[pos];
                if (count < needed) {
                    score += (needed - count) * 50;
                }
            });
        });
    }

    return Math.round(score);
}

function calculateConfidence(teams, formation, mode){
    let confidence = 100;

    // Check skill balance
    const skills = teams.map(t => t.players.reduce((s, p) => s + p.skill, 0));
    const avgSkill = skills.reduce((a, b) => a + b, 0) / skills.length;
    const skillDiff = Math.max(...skills) - Math.min(...skills);
    if (skillDiff > avgSkill * 0.3) confidence -= 10;
    if (skillDiff > avgSkill * 0.5) confidence -= 15;

    // Check formation requirements
    if (formation !== "livre" && formation !== "areia" && formation !== "quarteto") {
        const required = FORMATIONS[formation].required;
        const totalMissing = teams.reduce((sum, team) => {
            return sum + Object.keys(required).reduce((teamSum, pos) => {
                const count = team.players.filter(p => p.positionMain === pos).length;
                const needed = required[pos];
                return teamSum + Math.max(0, needed - count);
            }, 0);
        }, 0);

        if (totalMissing > 0) confidence -= totalMissing * 5;
    }

    return Math.max(0, confidence);
}

function shuffle(arr){
    const result = arr.slice();
    for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
}

function getTeamCount(playerCount){
    if (playerCount <= 10) return 2;
    if (playerCount <= 18) return 3;
    return 4;
}

function renderTeams(teams, confidence, formation, mode){
    const result = document.getElementById("result");
    const confidenceText = getConfidenceLabel(confidence);
    document.getElementById("confidenceHint").textContent = `Índice de confiança: ${confidenceText} (${confidence}%)`;

    const TEAM_COLORS = [
        { color: "var(--team1)", soft: "var(--team1-soft)" },
        { color: "var(--team2)", soft: "var(--team2-soft)" },
        { color: "var(--team3)", soft: "var(--team3-soft)" },
        { color: "var(--team4)", soft: "var(--team4-soft)" },
    ];

    result.innerHTML = `
        <div class="teams-grid">
            ${teams.map((team, tIdx) => {
                const tc = TEAM_COLORS[tIdx % TEAM_COLORS.length];
                const strength = team.players.reduce((s, p) => s + p.skill, 0);
                const positionCounts = {};
                team.players.forEach(p => {
                    positionCounts[p.positionMain] = (positionCounts[p.positionMain] || 0) + 1;
                });
                const positions = Object.entries(positionCounts).map(([pos, count]) => `${POSITIONS[pos]} ×${count}`).join("  ·  ");

                return `
                    <div class="team" style="border-color:${tc.color}33;">
                        <div class="team-header" style="background:${tc.soft}; border-bottom-color:${tc.color}33;">
                            <div class="team-color-bar" style="background:${tc.color};"></div>
                            <div class="team-title" style="color:${tc.color};">${team.name}</div>
                            <div class="team-stats">
                                <span class="stat-badge" style="background:${tc.color}22; color:${tc.color};">${team.players.length} jogadores</span>
                                <span class="stat-badge" style="background:${tc.color}22; color:${tc.color};">⚡ ${strength}</span>
                            </div>
                        </div>
                        <div class="team-positions">${positions}</div>
                        <div class="team-body">
                            ${team.players.map((player, idx) => `
                                <div class="team-player">
                                    <div class="player-order" style="background:${tc.color}20; color:${tc.color};">${idx + 1}</div>
                                    <strong>${escapeHtml(player.name)}</strong>
                                    <span class="player-role-badge" style="background:${tc.color}18; color:${tc.color};">${POSITIONS[player.positionMain] || player.positionMain}</span>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("")}
        </div>
    `;
}

function getConfidenceLabel(confidence){
    if (confidence >= 90) return "Excelente";
    if (confidence >= 80) return "Bom";
    if (confidence >= 70) return "Regular";
    return "Aceitável";
}

function escapeHtml(text){
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

function initTheme(){
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
    document.documentElement.dataset.theme = prefersDark.matches ? "dark" : "light";
    prefersDark.addEventListener("change", e => {
        document.documentElement.dataset.theme = e.matches ? "dark" : "light";
    });
}

init();
</script>
