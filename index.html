<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteia Aí!</title>
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#0d2146">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
    color-scheme:light;
    --bg:#eef1f6;
    --surface:#ffffff;
    --surface-soft:#f5f7fa;
    --line:#d0d7e3;
    --text:#0f172a;
    --muted:#64748b;
    --shadow:0 20px 60px rgba(15,23,42,0.13);
    --header-from:#0d2146;
    --header-to:#1a3a6e;
    --font:'Inter',system-ui,-apple-system,sans-serif;
}
html[data-theme='dark']{
    color-scheme:dark;
    --bg:#0a0f1e;
    --surface:#131929;
    --surface-soft:#0f1522;
    --line:#232d42;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
    --header-from:#060d1f;
    --header-to:#0d2146;
}
*{ box-sizing:border-box; }
body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
h1,h2,h3,p{ margin:0; }

.app{ width:min(100%,520px); margin:0 auto; padding-bottom:24px; }

/* HEADER */
.topbar{ overflow:hidden; line-height:0; }
.topbar-banner{ width:100%; height:auto; display:block; }

/* SPORT GRID */
.sport-section{ padding:16px 14px 0; }
.section-label{
    font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:0.08em;color:var(--muted);margin-bottom:10px;
}
.sport-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}
.sport-card{
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    gap:6px;
    padding:20px 12px 16px;
    background:var(--surface);
    border:1.5px solid var(--line);
    border-radius:16px;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 12px rgba(15,23,42,0.06);
    transition:transform 100ms, box-shadow 120ms, border-color 120ms;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    position:relative;
    overflow:hidden;
}
.sport-card:active{ transform:scale(0.96); }
.sport-card::before{
    content:'';
    position:absolute;inset:0;
    opacity:0;
    transition:opacity 120ms;
}
.sport-card:hover::before{ opacity:1; }

.sport-card.volei  { border-color:#2563eb33; }
.sport-card.volei::before  { background:#2563eb08; }
.sport-card.volei:hover    { border-color:#2563eb; box-shadow:0 4px 20px #2563eb25; }

.sport-card.futebol { border-color:#16a34a33; }
.sport-card.futebol::before { background:#16a34a08; }
.sport-card.futebol:hover   { border-color:#16a34a; box-shadow:0 4px 20px #16a34a25; }

.sport-card.basquete { border-color:#ea580c33; }
.sport-card.basquete::before { background:#ea580c08; }
.sport-card.basquete:hover   { border-color:#ea580c; box-shadow:0 4px 20px #ea580c25; }

.sport-card.handebol { border-color:#7c3aed33; }
.sport-card.handebol::before { background:#7c3aed08; }
.sport-card.handebol:hover   { border-color:#7c3aed; box-shadow:0 4px 20px #7c3aed25; }

.sport-emoji{ width:80px; height:80px; object-fit:contain; display:block; }
.sport-name{
    font-size:16px;font-weight:800;letter-spacing:-0.2px;
    position:relative;z-index:1;
}
.sport-desc{
    font-size:11px;color:var(--muted);font-weight:500;
    text-align:center;line-height:1.4;
    position:relative;z-index:1;
}

.sport-badge{
    position:absolute;top:10px;right:10px;
    font-size:9px;font-weight:800;text-transform:uppercase;
    letter-spacing:0.05em;padding:2px 7px;border-radius:20px;
}
.sport-card.volei   .sport-badge{ background:#dbeafe;color:#1d4ed8; }
.sport-card.futebol .sport-badge{ background:#dcfce7;color:#15803d; }
.sport-card.basquete .sport-badge{ background:#ffedd5;color:#c2410c; }
.sport-card.handebol .sport-badge{ background:#ede9fe;color:#6d28d9; }

html[data-theme='dark'] .sport-card.volei   .sport-badge{ background:#1e3a5f;color:#93c5fd; }
html[data-theme='dark'] .sport-card.futebol .sport-badge{ background:#14532d;color:#86efac; }
html[data-theme='dark'] .sport-card.basquete .sport-badge{ background:#431407;color:#fdba74; }
html[data-theme='dark'] .sport-card.handebol .sport-badge{ background:#2e1065;color:#c4b5fd; }

/* FOOTER */
.footer-signature{
    display:flex;align-items:center;justify-content:center;
    padding:20px 16px 8px;
}
.footer-signature img{
    width:130px;height:auto;
    background:white;border-radius:8px;
    padding:4px 10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
</style>
</head>
<body>
<main class="app">
    <header class="topbar">
        <img src="banner-home.png" class="topbar-banner" alt="Sorteia Aí!">
    </header>

    <section class="sport-section">
        <p class="section-label">Modalidades disponíveis</p>
        <div class="sport-grid">
            <a href="volei.html" class="sport-card volei">
                <span class="sport-badge">Ativo</span>
                <img class="sport-emoji" src="sport-volei.png" alt="Vôlei">
                <span class="sport-name">Vôlei</span>
                <span class="sport-desc">Times equilibrados por posição e nível</span>
            </a>
            <a href="futebol.html" class="sport-card futebol">
                <span class="sport-badge">Ativo</span>
                <img class="sport-emoji" src="sport-futebol.png" alt="Futebol">
                <span class="sport-name">Futebol</span>
                <span class="sport-desc">Society, futsal, campo e pelada</span>
            </a>
            <a href="basquete.html" class="sport-card basquete">
                <span class="sport-badge">Ativo</span>
                <img class="sport-emoji" src="sport-basquete.png" alt="Basquete">
                <span class="sport-name">Basquete</span>
                <span class="sport-desc">5x5 oficial e 3x3 olímpico</span>
            </a>
            <a href="handebol.html" class="sport-card handebol">
                <span class="sport-badge">Ativo</span>
                <img class="sport-emoji" src="sport-handebol.png" alt="Handebol">
                <span class="sport-name">Handebol</span>
                <span class="sport-desc">7x7 oficial e formações livres</span>
            </a>
        </div>
    </section>

    <footer class="footer-signature">
        <img src="cpz-assinatura.png" alt="CPZ">
    </footer>
</main>
<script>
(function(){
    const dark = window.matchMedia("(prefers-color-scheme: dark)");
    document.documentElement.dataset.theme = dark.matches ? "dark" : "light";
    dark.addEventListener("change", e => { document.documentElement.dataset.theme = e.matches ? "dark" : "light"; });
})();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
</script>
</body>
</html>
